<!doctype html>
<html>
  <head>
    <title>Cadastro de Cliente</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'core/style.css' %}" />
  </head>
  <body>
    <div class="container">
      <h1>Cadastro de Cliente</h1>

      <div class="card">
        <form method="POST">
          {% csrf_token %}

          <input
            type="text"
            name="nome"
            placeholder="Nome"
            required
          /><br /><br />
          <input
            type="text"
            name="telefone"
            placeholder="Telefone"
            required
          /><br /><br />
          <input
            type="email"
            name="email"
            placeholder="Email"
            required
          /><br /><br />
          <input
            type="text"
            name="endereco"
            placeholder="Endereço"
            required
          /><br /><br />

          <button type="submit">Cadastrar</button>
        </form>
      </div>
    </div>
  </body>
</html>
